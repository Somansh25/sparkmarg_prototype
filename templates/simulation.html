    <div class="container dashboard-container">
      
      <!-- Simulation Metadata Header Pipeline -->
      <div class="simulation-header">
        <div class="simulation-meta">
          <a href="/dashboard" class="exit-link">← Exit to Dashboard</a>
          <h1 id="sim-title" class="simulation-title">Loading Scenario...</h1>
          <span id="sim-domain" class="catalog-card-domain">Loading Domain...</span>
        </div>
        <div class="badge-container">
          <span id="sim-difficulty" class="badge">Determining Difficulty...</span>
        </div>
      </div>

      <!-- Main Interaction Workspace Split -->
      <div class="grid grid-dashboard">
        
        <!-- Sidebar: Active Progression Metric Scorecard -->
        <div class="dashboard-sidebar">
          <div class="card skills-card">
            <h3 class="card-subtitle">Session Scorecard</h3>
            
            <div class="skills-list">
              <div class="skill-item">
                <span class="skill-name">⚡ Leadership</span>
                <span id="score-leadership" class="skill-value">0</span>
              </div>
              
              <div class="skill-item">
                <span class="skill-name">💻 Technical Execution</span>
                <span id="score-technical" class="skill-value">0</span>
              </div>
              
              <div class="skill-item">
                <span class="skill-name">🧩 Problem Solving</span>
                <span id="score-problem-solving" class="skill-value">0</span>
              </div>
              
              <div class="skill-item">
                <span class="skill-name">🗣️ Communication</span>
                <span id="score-communication" class="skill-value">0</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Main Body Panel: Interactive Scenario Terminal Canvas -->
        <div class="dashboard-main">
          <div id="sim-player-card" class="card simulation-card shadow-md">
            
            <!-- Step Context Descriptions -->
            <div>
              <h2 id="step-title" class="stream-row-title">Evaluating Scene Variables...</h2>
              <div id="step-scenario" class="node-text">
                <div class="skeleton skeleton-text-long"></div>
                <div class="skeleton skeleton-text-md"></div>
              </div>
            </div>

            <!-- Branching Choice Options Selection Area -->
            <div id="options-container" class="choices-container">
              <div class="skeleton skeleton-btn"></div>
              <div class="skeleton skeleton-btn"></div>
            </div>

            <!-- Consequence Feedback Presentation Overlay -->
            <div id="sim-feedback-container" class="summary-block">
              <p id="sim-feedback-text" class="summary-text text-muted"></p>
            </div>

            <!-- Process Execution Button Controls -->
            <div class="catalog-card-footer">
              <button id="submit-decision-btn" class="btn btn-primary" disabled>
                Submit Decision
              </button>
              <button id="next-step-btn" class="btn btn-outline">
                Advance Route
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>
